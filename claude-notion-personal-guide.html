<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude × Notion 일상 활용 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --surface: #ffffff;
  --surface-raised: #f5f3ef;
  --surface-hover: #edeae4;
  --border: #e2ddd5;
  --border-accent: #c4b8a8;
  --text: #2c2825;
  --text-muted: #6b635a;
  --text-dim: #9e958a;
  --accent: #c67b48;
  --accent-bright: #d4894f;
  --accent-dim: #a86638;
  --accent-bg: #c67b4810;
  --notion: #000000;
  --claude: #c67b48;
  --success: #5a9e6f;
  --warning: #c69a48;
  --danger: #c65a48;
  --tag-daily: #5a8ec6;
  --tag-health: #5a9e6f;
  --tag-finance: #c69a48;
  --tag-study: #8b6ec6;
  --tag-travel: #c6485a;
  --tag-creative: #c67b48;
  --tag-social: #48a0c6;
  --tag-home: #6b8e5a;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(44,40,37,0.06);
  --shadow-hover: 0 8px 32px rgba(44,40,37,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.75;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Hero */
.hero {
  position: relative;
  min-height: 46vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 72px 24px 48px;
  overflow: hidden;
  background: linear-gradient(180deg, #f0ece4 0%, var(--bg) 100%);
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b8a8' fill-opacity='0.08'%3E%3Ccircle cx='30' cy='30' r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}

.hero-badge {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 28px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.7s ease-out;
}

.hero-badge .dot {
  width: 7px; height: 7px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

.hero h1 {
  position: relative;
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 5.5vw, 58px);
  font-weight: 400;
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin-bottom: 18px;
  color: var(--text);
  animation: fadeUp 0.7s ease-out 0.1s both;
}

.hero h1 .em {
  font-style: italic;
  color: var(--accent);
}

.hero p {
  position: relative;
  max-width: 520px;
  font-size: 15px;
  color: var(--text-muted);
  font-weight: 300;
  animation: fadeUp 0.7s ease-out 0.2s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.stats-bar {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 24px;
  margin-top: 32px;
  animation: fadeUp 0.7s ease-out 0.3s both;
}

.stat { text-align: center; }
.stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 30px;
  color: var(--accent);
}
.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

/* Container */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* Filter */
.filter-section {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
  animation: fadeUp 0.7s ease-out 0.4s both;
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-right: 6px;
  font-weight: 500;
}

.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.search-input {
  flex: 1;
  min-width: 180px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.25s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

/* Cards */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}

.tip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  animation: cardIn 0.5s ease-out both;
}

.tip-card:hover {
  border-color: var(--border-accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.tip-card.expanded {
  grid-column: 1 / -1;
  border-color: var(--accent);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 20px 20px 14px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.card-icon {
  flex-shrink: 0;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 11px;
  font-size: 21px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
}

.card-meta { flex: 1; min-width: 0; }

.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.tag {
  padding: 2px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.tag-daily { background: #5a8ec612; color: var(--tag-daily); }
.tag-health { background: #5a9e6f12; color: var(--tag-health); }
.tag-finance { background: #c69a4812; color: var(--tag-finance); }
.tag-study { background: #8b6ec612; color: var(--tag-study); }
.tag-travel { background: #c6485a12; color: var(--tag-travel); }
.tag-creative { background: #c67b4812; color: var(--tag-creative); }
.tag-social { background: #48a0c612; color: var(--tag-social); }
.tag-home { background: #6b8e5a12; color: var(--tag-home); }

.card-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.4;
}

.card-desc {
  padding: 0 20px;
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 300;
}

.card-footer {
  padding: 12px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.difficulty { display: flex; gap: 3px; }
.diff-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.diff-dot.filled { background: var(--accent); }

.expand-hint {
  font-size: 12px;
  color: var(--text-dim);
  transition: color 0.2s;
}
.tip-card:hover .expand-hint { color: var(--accent); }

/* Detail */
.card-detail {
  display: none;
  padding: 0 20px 24px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.tip-card.expanded .card-detail { display: block; }

.detail-section { margin-top: 18px; }

.detail-section h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.prompt-box {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-muted);
  position: relative;
  margin-bottom: 10px;
  white-space: pre-wrap;
  word-break: break-word;
}

.prompt-box .user-msg { color: var(--accent-dim); font-weight: 500; }

.copy-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.tip-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.tip-list li {
  padding: 10px 14px;
  background: var(--surface-raised);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-muted);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  line-height: 1.6;
}

.tip-list li::before {
  content: '·';
  color: var(--accent);
  font-weight: 900;
  font-size: 18px;
  flex-shrink: 0;
  line-height: 1.4;
}

.warning-box {
  background: #c69a4808;
  border: 1px solid #c69a4820;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warning);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.tool-used {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin: 2px;
}

.tools-used-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 12px;
}

.scenario-box {
  background: var(--accent-bg);
  border: 1px solid #c67b4820;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
  line-height: 1.7;
}

.scenario-box strong { color: var(--accent-dim); }

/* Footer */
.footer-note {
  text-align: center;
  padding: 40px 24px;
  font-size: 13px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

@media (max-width: 600px) {
  .stats-bar { gap: 20px; }
  .cards-grid { grid-template-columns: 1fr; }
  .filter-row { gap: 5px; }
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">
    <span class="dot"></span>
    개인 일상 활용 편
  </div>
  <h1>Claude × Notion<br><span class="em">일상을 정리하다</span></h1>
  <p>일기, 가계부, 독서, 여행, 건강 관리까지 — Notion 연동으로 일상의 모든 기록을 자동화하는 팁 모음입니다.</p>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num">20</div>
      <div class="stat-label">활용 팁</div>
    </div>
    <div class="stat">
      <div class="stat-num">8</div>
      <div class="stat-label">카테고리</div>
    </div>
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">가능성</div>
    </div>
  </div>
</section>

<div class="container">
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">카테고리</span>
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="daily">📝 일상기록</button>
      <button class="filter-btn" data-filter="health">💪 건강</button>
      <button class="filter-btn" data-filter="finance">💰 재정</button>
      <button class="filter-btn" data-filter="study">📚 학습</button>
      <button class="filter-btn" data-filter="travel">✈️ 여행</button>
      <button class="filter-btn" data-filter="creative">🎨 창작</button>
      <button class="filter-btn" data-filter="social">🤝 인간관계</button>
      <button class="filter-btn" data-filter="home">🏠 집·생활</button>
      <input type="text" class="search-input" placeholder="팁 검색..." id="searchInput">
    </div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="footer-note">
    카드를 클릭하면 예시 프롬프트와 실전 활용 가이드가 펼쳐집니다 ✦
  </div>
</div>

<script>
const tips = [
  {
    id: 1, icon: "📓", tags: ["daily"],
    title: "일기 & 회고 자동화",
    desc: "하루를 간단히 말하면 Claude가 구조화된 일기 페이지를 Notion에 만들어줍니다.",
    difficulty: 1,
    prompt: `<span class="user-msg">오늘 하루 기록 좀 해줘.\n아침에 카페에서 책 읽었고, 점심에 친구 만나서 파스타 먹었어. 오후에 운동하고 저녁에 넷플릭스 봤어. 기분은 전반적으로 좋았는데 약간 피곤했어.\n날짜별 일기 DB에 저장해줘.</span>`,
    detail: [
      "일기 DB에 날짜, 기분(셀렉트), 키워드(멀티셀렉트), 에너지(숫자 1~5) 속성을 설계해두면 나중에 패턴 분석 가능",
      "Claude가 대화체를 구조화된 마크다운 일기로 변환하여 저장",
      "매일 반복할 필요 없이 '오늘 기록해줘'만 말하면 자동으로 오늘 날짜에 생성",
      "한 주가 끝나면 '이번 주 일기 요약해줘'로 위클리 리뷰도 자동화 가능"
    ],
    scenario: "매일 10초만 투자해서 하루를 말하면, 한 달 후 자신의 생활 패턴이 데이터로 보입니다.",
    warning: null,
    tools: ["notion-search", "notion-create-pages"]
  },
  {
    id: 2, icon: "🏃", tags: ["health"],
    title: "운동 기록 & 루틴 관리",
    desc: "운동 내용을 말하면 기록하고, 지난 기록을 분석해서 다음 루틴을 제안합니다.",
    difficulty: 1,
    prompt: `<span class="user-msg">오늘 운동 기록해줘.\n벤치프레스 60kg 5세트, 덤벨 플라이 12kg 4세트, 트라이셉 푸시다운 3세트.\n유산소 러닝머신 30분. 컨디션은 보통.</span>`,
    detail: [
      "운동 DB에 날짜, 부위(멀티셀렉트), 운동종목, 세트/무게 상세, 유산소 시간, 컨디션 등을 기록",
      "'이번 달 운동 기록 분석해줘'로 부위별 빈도, 무게 변화 추이 확인 가능",
      "'다음 주 상체 루틴 짜줘'라고 하면 기존 기록 기반으로 점진적 과부하 반영한 루틴 제안",
      "DB 뷰를 캘린더로 설정하면 운동 일지를 한눈에 확인"
    ],
    scenario: "운동 끝나고 쉬면서 10초만 기록. 3개월 뒤 확실한 성장 데이터가 쌓입니다.",
    warning: null,
    tools: ["notion-create-pages", "notion-search", "notion-fetch"]
  },
  {
    id: 3, icon: "💸", tags: ["finance"],
    title: "가계부 & 소비 패턴 분석",
    desc: "지출을 말하면 가계부에 기록하고, 월별 소비 패턴을 분석해줍니다.",
    difficulty: 2,
    prompt: `<span class="user-msg">오늘 지출 기록해줘.\n- 아침 커피 4,500원 (카페)\n- 점심 김치찌개 9,000원 (식비)\n- 넷플릭스 17,000원 (구독)\n- 택시 8,200원 (교통)</span>`,
    detail: [
      "가계부 DB: 날짜, 항목(제목), 금액(숫자), 카테고리(셀렉트: 식비/교통/문화/구독 등), 결제수단(셀렉트)",
      "한 번에 여러 건을 일괄 등록 가능 (create-pages 배치)",
      "'이번 달 카테고리별 지출 정리해줘'로 소비 분석 — DB 차트 뷰와 함께 활용",
      "'지난달 대비 식비가 얼마나 늘었는지 알려줘'로 비교 분석"
    ],
    scenario: "영수증 사진 대신 한 줄 메시지. 월말에 '어디에 돈이 새는지' 바로 파악됩니다.",
    warning: "금액 속성은 반드시 NUMBER 타입(FORMAT 'won' 또는 'number')으로 설정해야 집계가 가능합니다.",
    tools: ["notion-create-pages", "notion-search", "notion-fetch"]
  },
  {
    id: 4, icon: "📖", tags: ["study"],
    title: "독서 노트 & 서재 관리",
    desc: "읽은 책의 메모를 구조화하고, 개인 서재 DB로 독서 기록을 관리합니다.",
    difficulty: 1,
    prompt: `<span class="user-msg">"아주 작은 습관의 힘" 다 읽었어.\n핵심 내용 정리해서 독서 노트로 만들어줘.\n별점 4.5, 카테고리는 자기계발로.</span>`,

const tagLabels = {
  daily: "📝 일상기록", health: "💪 건강", finance: "💰 재정",
  study: "📚 학습", travel: "✈️ 여행", creative: "🎨 창작",
  social: "🤝 인간관계", home: "🏠 집·생활"
};

function renderCards(filter = 'all', query = '') {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  const filtered = tips.filter(tip => {
    const matchFilter = filter === 'all' || tip.tags.includes(filter);
    const matchQuery = !query ||
      tip.title.toLowerCase().includes(query.toLowerCase()) ||
      tip.desc.toLowerCase().includes(query.toLowerCase()) ||
      tip.tags.some(t => tagLabels[t].includes(query));
    return matchFilter && matchQuery;
  });

  filtered.forEach((tip, i) => {
    const card = document.createElement('div');
    card.className = 'tip-card';
    card.style.animationDelay = `${i * 0.04}s`;

    const diffDots = Array.from({length: 3}, (_, j) =>
      `<div class="diff-dot ${j < tip.difficulty ? 'filled' : ''}"></div>`
    ).join('');

    const tagHTML = tip.tags.map(t =>
      `<span class="tag tag-${t}">${tagLabels[t]}</span>`
    ).join('');

    const toolsHTML = tip.tools.map(t =>
      `<span class="tool-used">⚙ ${t}</span>`
    ).join('');

    const detailItems = tip.detail.map(d =>
      `<li>${d}</li>`
    ).join('');

    const warningHTML = tip.warning ?
      `<div class="warning-box">⚠️ ${tip.warning}</div>` : '';

    const scenarioHTML = tip.scenario ?
      `<div class="scenario-box"><strong>💡 활용 시나리오:</strong> ${tip.scenario}</div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${tip.icon}</div>
        <div class="card-meta">
          <div class="card-tags">${tagHTML}</div>
          <div class="card-title">${tip.title}</div>
        </div>
      </div>
      <div class="card-desc">${tip.desc}</div>
      <div class="card-footer">
        <div class="difficulty">${diffDots}</div>
        <div class="expand-hint">클릭하여 상세보기 ↓</div>
      </div>
      <div class="card-detail">
        ${scenarioHTML}
        <div class="detail-section">
          <h4>💬 예시 프롬프트</h4>
          <div class="prompt-box">
            ${tip.prompt}
            <button class="copy-btn" onclick="event.stopPropagation(); copyPrompt(this)">복사</button>
          </div>
        </div>
        <div class="detail-section">
          <h4>📋 활용 가이드</h4>
          <ul class="tip-list">${detailItems}</ul>
        </div>
        ${warningHTML ? `<div class="detail-section">${warningHTML}</div>` : ''}
        <div class="tools-used-row">${toolsHTML}</div>
      </div>
    `;

    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      document.querySelectorAll('.tip-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!wasExpanded) {
        card.classList.add('expanded');
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
      }
    });

    grid.appendChild(card);
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim);">
      검색 결과가 없습니다. 다른 키워드로 시도해보세요.
    </div>`;
  }
}

function copyPrompt(btn) {
  const box = btn.parentElement;
  const text = box.textContent.replace('복사', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter, document.getElementById('searchInput').value);
  });
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
    renderCards(activeFilter, e.target.value);
  }, 200);
});

renderCards();
