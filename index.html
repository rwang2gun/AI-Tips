<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude × Notion 연동 활용 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-raised: #1a1a26;
  --surface-hover: #22223a;
  --border: #2a2a3e;
  --border-glow: #4f46e540;
  --text: #e8e6f0;
  --text-muted: #8b89a0;
  --text-dim: #5a5872;
  --accent: #7c6aef;
  --accent-bright: #9b8bff;
  --accent-dim: #4f46e5;
  --notion: #ffffff;
  --claude: #d4a574;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --tag-search: #3b82f6;
  --tag-create: #10b981;
  --tag-manage: #f59e0b;
  --tag-automate: #ef4444;
  --tag-collab: #8b5cf6;
  --tag-advanced: #ec4899;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.7;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Hero */
.hero {
  position: relative;
  min-height: 50vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 24px 60px;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, #4f46e510 0%, transparent 50%),
              radial-gradient(ellipse at 70% 30%, #d4a57408 0%, transparent 50%);
  animation: heroFloat 20s ease-in-out infinite;
}

@keyframes heroFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
}

.hero-badge {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 32px;
  animation: fadeUp 0.8s ease-out;
}

.hero-badge .dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.hero h1 {
  position: relative;
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
  animation: fadeUp 0.8s ease-out 0.1s both;
}

.hero h1 .gradient {
  background: linear-gradient(135deg, var(--accent-bright), var(--claude));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  position: relative;
  max-width: 560px;
  font-size: 16px;
  color: var(--text-muted);
  font-weight: 300;
  animation: fadeUp 0.8s ease-out 0.2s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Stats bar */
.stats-bar {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 48px;
  padding: 24px;
  margin-top: 40px;
  animation: fadeUp 0.8s ease-out 0.3s both;
}

.stat { text-align: center; }
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-bright);
}
.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Main layout */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* Filter */
.filter-section {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
  animation: fadeUp 0.8s ease-out 0.4s both;
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-right: 8px;
}

.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}

.filter-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: white;
}

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* Tip card */
.tip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  animation: cardIn 0.5s ease-out both;
}

.tip-card:hover {
  border-color: var(--accent-dim);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(79, 70, 229, 0.1);
}

.tip-card.expanded {
  grid-column: 1 / -1;
}

.tip-card.hidden {
  display: none;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.card-icon {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 20px;
}

.card-meta {
  flex: 1;
  min-width: 0;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.tag-search { background: #3b82f615; color: var(--tag-search); }
.tag-create { background: #10b98115; color: var(--tag-create); }
.tag-manage { background: #f59e0b15; color: var(--tag-manage); }
.tag-automate { background: #ef444415; color: var(--tag-automate); }
.tag-collab { background: #8b5cf615; color: var(--tag-collab); }
.tag-advanced { background: #ec489915; color: var(--tag-advanced); }

.card-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text);
}

.card-desc {
  padding: 0 20px;
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 300;
}

.card-footer {
  padding: 12px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.difficulty {
  display: flex;
  gap: 3px;
}

.diff-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.diff-dot.filled { background: var(--accent-bright); }

.expand-hint {
  font-size: 12px;
  color: var(--text-dim);
  transition: color 0.2s;
}

.tip-card:hover .expand-hint { color: var(--accent-bright); }

/* Expanded content */
.card-detail {
  display: none;
  padding: 0 20px 24px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.tip-card.expanded .card-detail { display: block; }

.detail-section {
  margin-top: 20px;
}

.detail-section h4 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-bright);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.prompt-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-muted);
  position: relative;
  margin-bottom: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}

.prompt-box .user-msg {
  color: var(--claude);
}

.prompt-box .highlight {
  color: var(--accent-bright);
  font-weight: 500;
}

.copy-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 4px 10px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover {
  background: var(--accent-dim);
  color: white;
  border-color: var(--accent);
}

.tip-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tip-list li {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-muted);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  line-height: 1.6;
}

.tip-list li::before {
  content: '→';
  color: var(--accent-bright);
  font-weight: 700;
  flex-shrink: 0;
}

.warning-box {
  background: #fbbf2408;
  border: 1px solid #fbbf2420;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warning);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.tool-used {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin: 2px;
}

.tools-used-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

/* Responsive */
@media (max-width: 600px) {
  .stats-bar { gap: 24px; }
  .cards-grid { grid-template-columns: 1fr; }
  .filter-row { gap: 6px; }
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">
    <span class="dot"></span>
    Notion MCP 연동 활성화됨
  </div>
  <h1>Claude <span class="gradient">×</span> Notion<br>연동 활용 가이드</h1>
  <p>MCP 커넥터로 연결된 Claude와 Notion, 실무에서 바로 쓸 수 있는 팁 모음. 카드를 클릭하면 예시 프롬프트와 상세 가이드가 열립니다.</p>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num">14</div>
      <div class="stat-label">사용 도구</div>
    </div>
    <div class="stat">
      <div class="stat-num">20+</div>
      <div class="stat-label">활용 팁</div>
    </div>
    <div class="stat">
      <div class="stat-num">6</div>
      <div class="stat-label">카테고리</div>
    </div>
  </div>
</section>

<div class="container">
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">필터</span>
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="search">🔍 검색</button>
      <button class="filter-btn" data-filter="create">✏️ 생성</button>
      <button class="filter-btn" data-filter="manage">📁 관리</button>
      <button class="filter-btn" data-filter="automate">⚡ 자동화</button>
      <button class="filter-btn" data-filter="collab">👥 협업</button>
      <button class="filter-btn" data-filter="advanced">🧪 고급</button>
      <input type="text" class="search-input" placeholder="팁 검색..." id="searchInput">
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid">
  </div>
</div>

<script>
const tips = [
  {
    id: 1,
    icon: "🔎",
    iconBg: "#3b82f615",
    tags: ["search"],
    title: "워크스페이스 시맨틱 검색",
    desc: "키워드가 아닌 의미 기반으로 Notion 전체를 검색합니다. 정확한 제목을 몰라도 개념만으로 찾아냅니다.",
    difficulty: 1,
    prompt: `<span class="user-msg">우리 프로젝트에서 "캐릭터 전환 시 버프 유지" 관련 논의가 있었던 페이지를 찾아줘</span>`,
    detail: [
      "notion-search 도구가 시맨틱(의미) 검색을 지원하므로, 정확한 제목을 몰라도 '개념'으로 검색 가능",
      "검색 범위를 특정 팀스페이스로 한정하려면 teamspace_id를 지정할 수 있음",
      "Notion에 연결된 외부 소스(Slack, Google Drive, Jira 등)도 함께 검색됨"
    ],
    warning: "검색 결과의 하이라이트 길이를 조절(max_highlight_length)하면 토큰을 절약할 수 있습니다.",
    tools: ["notion-search"]
  },
  {
    id: 2,
    icon: "📄",
    iconBg: "#10b98115",
    tags: ["create"],
    title: "기획서 초안 자동 생성",
    desc: "대화에서 논의한 내용을 바탕으로 Notion에 기획서 페이지를 즉시 생성합니다.",
    difficulty: 1,
    prompt: `<span class="user-msg">방금 논의한 "원소 반응 우선순위 시스템"을 기획서 초안으로 만들어서 Notion에 올려줘. 기획 의도 → 기능 정의 → 예외 처리 구조로 작성해줘.</span>`,
    detail: [
      "notion-create-pages 도구로 마크다운 형식의 콘텐츠를 가진 페이지를 바로 생성",
      "parent를 지정하면 원하는 페이지 하위에 생성 가능 (page_id 또는 data_source_id)",
      "아이콘(emoji)과 커버 이미지도 동시에 설정 가능",
      "기존 템플릿을 적용하려면 template_id를 함께 전달"
    ],
    warning: "Notion 마크다운은 표준과 약간 다릅니다. 토글, 콜아웃 등 Notion 전용 문법이 있으므로 enhanced-markdown-spec을 참고하면 더 풍부한 문서를 만들 수 있습니다.",
    tools: ["notion-create-pages"]
  },
  {
    id: 3,
    icon: "🗃️",
    iconBg: "#10b98115",
    tags: ["create", "manage"],
    title: "데이터베이스(DB) 생성 & 스키마 설계",
    desc: "SQL DDL 문법으로 Notion DB를 생성합니다. 속성 타입, 셀렉트 옵션, 릴레이션까지 한 번에.",
    difficulty: 2,
    prompt: `<span class="user-msg">전투 밸런스 테스트 로그를 관리할 Notion DB를 만들어줘.\n속성: 테스트명(제목), 캐릭터(셀렉트), 스킬 조합(멀티셀렉트), DPS 결과(숫자), 상태(상태), 테스트 일자(날짜), 담당자(사람)</span>`,
    detail: [
      "notion-create-database가 SQL CREATE TABLE 문법을 사용 — SELECT, MULTI_SELECT, NUMBER, DATE, PEOPLE, STATUS 등 지원",
      "RELATION으로 다른 DB와 연결, ROLLUP으로 집계 속성도 추가 가능",
      "UNIQUE_ID로 고유 식별자 자동 부여 (PREFIX 지정 가능, 예: 'BAL-001')",
      "생성 후 notion-create-view로 보드/캘린더/차트 뷰를 추가 설정 가능"
    ],
    warning: null,
    tools: ["notion-create-database", "notion-create-view"]
  },
  {
    id: 4,
    icon: "📊",
    iconBg: "#f59e0b15",
    tags: ["manage", "advanced"],
    title: "뷰 커스터마이징 — 필터·정렬·그룹·차트",
    desc: "기존 DB에 보드, 캘린더, 타임라인, 차트 등 다양한 뷰를 추가하고 설정합니다.",
    difficulty: 2,
    prompt: `<span class="user-msg">밸런스 테스트 DB에 다음 뷰들을 추가해줘:\n1. "진행중 테스트" — 상태가 In Progress인 것만 필터링한 테이블\n2. "캐릭터별 보드" — 캐릭터 속성으로 그룹핑한 보드 뷰\n3. "일정" — 테스트 일자 기반 캘린더 뷰</span>`,
    detail: [
      "notion-create-view에서 type으로 table/board/calendar/timeline/gallery/chart/dashboard 등 지정",
      "configure DSL로 FILTER, SORT BY, GROUP BY, CALENDAR BY, TIMELINE BY, CHART 등 설정",
      "SHOW 지시어로 표시할 속성을 선택적으로 지정 가능",
      "차트 뷰에서는 column/bar/line/donut/number 타입과 AGGREGATE 함수 지원"
    ],
    warning: null,
    tools: ["notion-create-view", "notion-update-view"]
  },
  {
    id: 5,
    icon: "🔄",
    iconBg: "#f59e0b15",
    tags: ["manage"],
    title: "페이지 내용 부분 수정 (Search & Replace)",
    desc: "전체를 덮어쓰지 않고, 특정 섹션만 정밀하게 수정합니다.",
    difficulty: 2,
    prompt: `<span class="user-msg">전투 시스템 설계서의 "회피 무적 프레임" 섹션에서\n무적 프레임을 0.3초에서 0.4초로 수정하고,\n해당 섹션 아래에 "모바일 대응 참고사항" 항목을 추가해줘.</span>`,
    detail: [
      "notion-update-page의 update_content 커맨드를 사용 — old_str로 기존 텍스트를 찾고 new_str로 교체",
      "여러 수정을 content_updates 배열에 담아 한 번에 처리 가능 (최대 100개)",
      "replace_content를 쓰면 전체 내용을 통째로 교체 가능하지만, 하위 페이지/DB가 있으면 주의 필요",

      "'unverified'로 설정하면 검증 해제"
    ],
    warning: "Verification은 Business/Enterprise 플랜 이상에서만 지원됩니다.",
    tools: ["notion-update-page"]
  },
  {
    id: 20,
    icon: "🎯",
    iconBg: "#ec489915",
    tags: ["advanced", "automate"],
    title: "프롬프트 체이닝 — 복합 워크플로 구성",
    desc: "여러 도구를 연결하여 검색→분석→생성→코멘트까지 한 번에 처리하는 패턴입니다.",
    difficulty: 3,
    prompt: `<span class="user-msg">다음을 순서대로 해줘:\n1. "전투 시스템" 관련 문서를 전부 찾아줘\n2. 각 문서의 마지막 수정일과 검증 상태를 정리해줘\n3. 3개월 이상 미수정 문서는 "문서 리프레시 필요" DB에 등록\n4. 해당 문서들에 "업데이트 필요" 코멘트를 남겨줘</span>`,
    detail: [
      "Notion MCP 도구들을 순차적으로 호출하는 '체이닝' 패턴",
      "search → fetch(여러 번) → create-pages(DB 등록) → create-comment 순서",
      "Claude가 중간 결과를 분석·판단하여 다음 단계에 반영",
      "이 패턴을 응용하면: 스프린트 리뷰, 문서 품질 관리, 온보딩 체크리스트 등 다양한 자동화 가능"
    ],
    warning: "복합 워크플로는 다수의 API 호출이 발생합니다. 한 번에 너무 많은 페이지를 처리하면 속도가 느려질 수 있으니, 적절한 범위를 지정하세요.",
    tools: ["notion-search", "notion-fetch", "notion-create-pages", "notion-create-comment"]
  }
];

const tagLabels = {
  search: "🔍 검색",
  create: "✏️ 생성",
  manage: "📁 관리",
  automate: "⚡ 자동화",
  collab: "👥 협업",
  advanced: "🧪 고급"
};

function renderCards(filter = 'all', query = '') {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  const filtered = tips.filter(tip => {
    const matchFilter = filter === 'all' || tip.tags.includes(filter);
    const matchQuery = !query ||
      tip.title.toLowerCase().includes(query.toLowerCase()) ||
      tip.desc.toLowerCase().includes(query.toLowerCase()) ||
      tip.tools.some(t => t.toLowerCase().includes(query.toLowerCase()));
    return matchFilter && matchQuery;
  });

  filtered.forEach((tip, i) => {
    const card = document.createElement('div');
    card.className = 'tip-card';
    card.style.animationDelay = `${i * 0.05}s`;

    const diffDots = Array.from({length: 3}, (_, j) =>
      `<div class="diff-dot ${j < tip.difficulty ? 'filled' : ''}"></div>`
    ).join('');

    const tagHTML = tip.tags.map(t =>
      `<span class="tag tag-${t}">${tagLabels[t]}</span>`
    ).join('');

    const toolsHTML = tip.tools.map(t =>
      `<span class="tool-used">⚙️ ${t}</span>`
    ).join('');

    const detailItems = tip.detail.map(d =>
      `<li>${d}</li>`
    ).join('');

    const warningHTML = tip.warning ?
      `<div class="warning-box">⚠️ ${tip.warning}</div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon" style="background:${tip.iconBg}">${tip.icon}</div>
        <div class="card-meta">
          <div class="card-tags">${tagHTML}</div>
          <div class="card-title">${tip.title}</div>
        </div>
      </div>
      <div class="card-desc">${tip.desc}</div>
      <div class="card-footer">
        <div class="difficulty">${diffDots}</div>
        <div class="expand-hint">클릭하여 상세보기 ↓</div>
      </div>
      <div class="card-detail">
        <div class="detail-section">
          <h4>💡 예시 프롬프트</h4>
          <div class="prompt-box">
            ${tip.prompt}
            <button class="copy-btn" onclick="event.stopPropagation(); copyPrompt(this)">복사</button>
          </div>
        </div>
        <div class="detail-section">
          <h4>📋 상세 가이드</h4>
          <ul class="tip-list">${detailItems}</ul>
        </div>
        ${warningHTML ? `<div class="detail-section">${warningHTML}</div>` : ''}
        <div class="tools-used-row">${toolsHTML}</div>
      </div>
    `;

    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      document.querySelectorAll('.tip-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!wasExpanded) {
        card.classList.add('expanded');
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
      }
    });

    grid.appendChild(card);
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim);">
      검색 결과가 없습니다. 다른 키워드로 시도해보세요.
    </div>`;
  }
}

function copyPrompt(btn) {
  const box = btn.parentElement;
  const text = box.textContent.replace('복사', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter, document.getElementById('searchInput').value);
  });
});

// Search
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
    renderCards(activeFilter, e.target.value);
  }, 200);
});

// Init
renderCards();
</script>
</body>
</html>
